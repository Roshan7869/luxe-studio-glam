worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 64M;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Rate Limiting Zones ─────────────────────────────────────────────────
    # Prevents DDoS / brute-force at the Nginx layer
    # 10 req/s for general traffic; strict 2 req/s for API and login
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:5m      rate=2r/s;
    limit_req_zone $binary_remote_addr zone=login:5m    rate=1r/s;

    # ── Upstream: WordPress PHP-FPM ─────────────────────────────────────────
    upstream wordpress_backend {
        server wordpress:80;
        keepalive 32;
    }

    # ── Main Server Block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost glamlux2lux.com www.glamlux2lux.com;
        root /var/www/html;
        index index.php index.html index.htm;

        # ── Static Assets  ─────────────────────────────────────────────────
        location ~* \.(css|js|png|jpg|jpeg|gif|webp|ico|woff|woff2|ttf|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            # Serve from wp-content directly if possible
            try_files $uri =404;
        }

        # ── WordPress REST API (Rate limited) ─────────────────────────────
        location /wp-json/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://wordpress_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # PERF FIX (P3/Infra): Allow 60s for slow payroll/report queries
            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
        }

        # ── WordPress Login (Strict rate limit) ───────────────────────────
        location = /wp-login.php {
            limit_req zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://wordpress_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Admin Panel ─────────────────────────────────────────────────────
        location /wp-admin/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://wordpress_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Default: Proxy all PHP to WordPress ─────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass         http://wordpress_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Buffer settings for performance
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ── Security: block sensitive files ──────────────────────────────
        location ~* \.(htaccess|htpasswd|ini|log|sh|sql|bak)$ {
            deny all;
        }

        # ── Custom error pages ────────────────────────────────────────────
        error_page 429 /429.html;
        location = /429.html {
            return 429 '{"code":"rate_limit","message":"Too many requests. Please slow down."}';
            add_header Content-Type application/json;
        }
    }
}
