version: '3.9'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - wordpress:/var/www/html
    depends_on:
      - wordpress
    restart: always
    networks:
      - glamlux_net

  wordpress:
    build: ./wp
    container_name: glamlux_wp
    env_file:
      - .env
    environment:
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);
        define('WP_CACHE', true);
        define('DISABLE_WP_CRON', true);
        define('WP_DEBUG', false);
    volumes:
      - wordpress:/var/www/html
      - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - glamlux_net

  db:
    image: mysql:8
    container_name: glamlux_db
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    networks:
      - glamlux_net

  redis:
    image: redis:latest
    container_name: glamlux_redis
    # ACTION PLAN FIX: noeviction prevents cron locks and idempotency keys
    # from being silently dropped under memory pressure.
    # appendonly yes enables AOF persistence — locks survive container restarts.
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy noeviction --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - glamlux_net

volumes:
  wordpress:
  db_data:
  redis_data:


networks:
  glamlux_net:
    driver: bridge
