server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html index.htm;

    # Limit request zones (must coordinate with http {} block if needed, but safe here if global)
    # Using simplistic limits for standard proxy
    
    # Global gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Main WP Location
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # REST API Rules
    location /wp-json/ {
        # Limit API reading optionally (would need zone defined in http block) 
        try_files $uri $uri/ /index.php?$args;
        
        # PERF FIX (P3/Infra): Allow 60s for slow payroll/report queries
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass glamlux_wp:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Prevent 504s on slow jobs
        fastcgi_read_timeout 60s;
    }

    # Static file caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires max;
        log_not_found off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
