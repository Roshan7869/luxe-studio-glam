name: Production Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  PHP_VERSION: '8.1'
  NODE_VERSION: '18'
  RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_ENVIRONMENT_PROD: ${{ secrets.RAILWAY_ENVIRONMENT_PROD }}
  RAILWAY_ENVIRONMENT_DEV: ${{ secrets.RAILWAY_ENVIRONMENT_DEV }}

jobs:
  code-quality:
    name: Code Quality & Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysql, gd, curl, mbstring, json
          tools: phpstan, phpunit

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run PHPStan Static Analysis
        run: |
          echo "=== PHPStan Code Quality Scan ==="
          phpstan analyse wp-content/plugins/glamlux-core --level=6 --autoload-file=wp-settings.php || true
        continue-on-error: true

      - name: Run PHP Security Checker
        run: |
          echo "=== PHP Security Vulnerability Scan ==="
          curl -sS https://security.sensiolabs.org/check_lock | php -- composer.lock || true
        continue-on-error: true

      - name: WordPress Security Audit
        run: |
          echo "=== WordPress Plugin Security Scan ==="
          php -r "
          \$checks = [
            'SQL Injection' => '/\\\$wpdb->query\s*\(\s*[^prepared]/i',
            'XSS Vulnerabilities' => '/echo\s+[^wp_kses]/i',
            'Nonce Validation' => '/\\\$_POST|\\\$_REQUEST(?!.*wp_verify_nonce)/i',
            'Capability Checks' => '/add_action\s*\(\s*[\"']admin_/i'
          ];
          
          foreach (\$checks as \$check => \$pattern) {
            echo \"Checking for \$check...\n\";
            \$files = glob('wp-content/plugins/glamlux-core/**/*.php', GLOB_RECURSIVE);
            foreach (\$files as \$file) {
              \$content = file_get_contents(\$file);
              if (preg_match(\$pattern, \$content)) {
                echo \"  ⚠ Potential issue in \$file\n\";
              }
            }
          }
          echo \"Security audit complete.\n\";
          " || true
        continue-on-error: true

  database-tests:
    name: Database & Migration Testing
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: glamlux_test
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysql, pdo_mysql, gd, curl, mbstring

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -u root -proot -e "SELECT 1" && break || sleep 1
          done

      - name: Test Database Migrations
        run: |
          echo "=== Testing Database Migrations ==="
          mysql -h 127.0.0.1 -u root -proot glamlux_test < wp-content/plugins/glamlux-core/scripts/migrate-v7-token-management.php || true
          mysql -h 127.0.0.1 -u root -proot -e "SHOW TABLES FROM glamlux_test LIKE 'wp_gl_%';" || true
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mysql, gd, curl, mbstring, json
          tools: phpunit

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run PHPUnit Tests
        run: |
          echo "=== Running Unit Tests ==="
          if [ -f phpunit.xml.dist ]; then
            phpunit -c phpunit.xml.dist --coverage-text || true
          else
            echo "No phpunit.xml.dist found, skipping tests"
          fi
        continue-on-error: true

  lighthouse-ci:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './lhci-config.json'
          temporaryPublicStorage: true
        continue-on-error: true

  security-headers:
    name: Security Headers Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Security Configuration
        run: |
          echo "=== Validating Security Headers ==="
          
          # Check for HTTPS enforcement
          if grep -q "FORCE_SSL_ADMIN\|FORCE_SSL_LOGIN" wp-config-railway.php; then
            echo "✓ HTTPS enforcement configured"
          else
            echo "✗ WARNING: HTTPS enforcement not found"
          fi
          
          # Check for security headers class
          if [ -f "wp-content/plugins/glamlux-core/includes/class-glamlux-security-headers.php" ]; then
            echo "✓ Security headers class found"
          else
            echo "✗ ERROR: Security headers class missing"
            exit 1
          fi
          
          # Check for JWT auth class
          if [ -f "wp-content/plugins/glamlux-core/includes/class-glamlux-jwt-auth.php" ]; then
            echo "✓ JWT authentication class found"
            
            # Verify token expiration is implemented
            if grep -q "DEFAULT_EXPIRATION_HOURS\|cleanup_expired_tokens" wp-content/plugins/glamlux-core/includes/class-glamlux-jwt-auth.php; then
              echo "✓ Token expiration logic implemented"
            else
              echo "✗ WARNING: Token expiration logic not found"
            fi
          else
            echo "✗ ERROR: JWT auth class missing"
            exit 1
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [code-quality, database-tests, security-headers]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: ${{ secrets.RAILWAY_STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway Staging
        run: |
          echo "=== Deploying to Railway Staging ==="
          
          # Install Railway CLI
          npm install -g @railway/cli
          
          # Authenticate with Railway
          railway login --token ${{ secrets.RAILWAY_API_TOKEN }}
          
          # Set Railway environment
          railway environment ${{ secrets.RAILWAY_ENVIRONMENT_DEV }}
          
          # Deploy
          railway up
        continue-on-error: false

      - name: Run Smoke Tests (Staging)
        run: |
          echo "=== Running Smoke Tests ==="
          
          STAGING_URL="${{ secrets.RAILWAY_STAGING_URL }}"
          
          # Test health check endpoint
          curl -f "$STAGING_URL/wp-json/glamlux/v1/health" || exit 1
          
          # Test API endpoints
          curl -f "$STAGING_URL/wp-json/glamlux/v1/auth/login" -X POST -d '{"username":"test","password":"test"}' || true
          
          echo "✓ Smoke tests passed"
        continue-on-error: true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [code-quality, database-tests, security-headers, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ secrets.RAILWAY_PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Pre-Deployment Backup
        run: |
          echo "=== Creating Production Backup ==="
          
          # This would typically use your backup-database.sh script
          echo "Backup would be created here via Railway scheduled job"

      - name: Deploy to Railway Production
        run: |
          echo "=== Deploying to Railway Production ==="
          
          # Install Railway CLI
          npm install -g @railway/cli
          
          # Authenticate with Railway
          railway login --token ${{ secrets.RAILWAY_API_TOKEN }}
          
          # Set Railway environment
          railway environment ${{ secrets.RAILWAY_ENVIRONMENT_PROD }}
          
          # Deploy
          railway up
        continue-on-error: false

      - name: Run Production Health Checks
        run: |
          echo "=== Running Production Health Checks ==="
          
          PROD_URL="${{ secrets.RAILWAY_PRODUCTION_URL }}"
          
          # Test core endpoints
          curl -f "$PROD_URL/wp-json/" || exit 1
          curl -f "$PROD_URL/wp-json/glamlux/v1/health" || exit 1
          
          # Verify security headers
          HEADERS=$(curl -sI "$PROD_URL/" | grep -i "strict-transport-security")
          if [ -z "$HEADERS" ]; then
            echo "⚠ WARNING: HSTS header not found"
          else
            echo "✓ Security headers verified"
          fi
          
          echo "✓ Production health checks passed"
        continue-on-error: false

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✓ Deployment to production completed successfully!"
          echo "Environment: Production"
          echo "URL: ${{ secrets.RAILWAY_PRODUCTION_URL }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "✗ Production deployment failed!"
          echo "Please check the logs above and rollback if necessary."
